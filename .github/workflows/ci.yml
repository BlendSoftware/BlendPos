name: BlendPOS CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  REGISTRY: ghcr.io

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: blendpos
          POSTGRES_PASSWORD: blendpos_test
          POSTGRES_DB: blendpos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blendpos"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        working-directory: backend
        run: go test ./tests/... -v -cover -coverprofile=coverage.out
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: blendpos
          DB_PASSWORD: blendpos_test
          DB_NAME: blendpos_test
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci_test_secret_32_chars_minimum!!

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Para los tests de GitHub Actions está bien dejar localhost
          VITE_API_URL: http://localhost:8080
          VITE_API_BASE: http://localhost:8080

      - name: Run tests
        working-directory: frontend
        run: npm test

  build-and-push:
    needs: [backend-test, frontend-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Loguearse en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Formatear nombre del repo
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build y Push Backend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:latest ./backend
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/backend:latest

      - name: Build y Push AFIP Sidecar
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/afip-sidecar:latest ./afip-sidecar
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/afip-sidecar:latest

      - name: Build y Push Frontend
        run: |
          # ¡ATENCIÓN ACÁ! Cambiá el dominio falso por la API de producción.
          docker build -t ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/frontend:latest ./frontend --build-arg VITE_API_URL=https://api.blendpos.tech
          docker push ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/frontend:latest

  deploy-vps:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Executing remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.61.223.78
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            cd ~/blendpos
            
            git pull origin master
            
            # Loguearse con tu Personal Access Token (CR_PAT)
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            export GITHUB_REPOSITORY=$REPO_LOWER
            
            # Bajar solo las imágenes ya construidas
            docker compose -f docker-compose.vps.yml pull backend frontend afip-sidecar
            
            # Levantar con cero estrés
            docker compose -f docker-compose.vps.yml up -d --remove-orphans
name: BlendPOS CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: blendpos
          POSTGRES_PASSWORD: blendpos_test
          POSTGRES_DB: blendpos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blendpos"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        working-directory: backend
        run: go test ./tests/... -v -cover -coverprofile=coverage.out
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: blendpos
          DB_PASSWORD: blendpos_test
          DB_NAME: blendpos_test
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci_test_secret_32_chars_minimum!!

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080
          VITE_API_BASE: http://localhost:8080

      - name: Run tests
        working-directory: frontend
        run: npm test

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t blendpos-backend -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t blendpos-frontend ./frontend --build-arg VITE_API_URL=http://localhost:8080

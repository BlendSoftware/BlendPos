# docker-compose.prod.yml — BlendPOS Production Environment
# Deploy: docker compose -f docker-compose.prod.yml up -d
# Traefik handles SSL (Let's Encrypt) and reverse proxy

services:

  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # appendfsync always: flush every write to disk immediately.
    # Required for a fiscal POS — an OS crash must never lose a committed sale.
    # Trade-off: slightly higher write latency vs. the default "everysec".
    command: redis-server --appendonly yes --appendfsync always --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: 8
      JWT_REFRESH_HOURS: 24
      AFIP_SIDECAR_URL: http://afip-sidecar:8001
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      PDF_STORAGE_PATH: /pdf-storage
      DOMAIN: ${DOMAIN}
    volumes:
      - pdf_storage:/pdf-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      afip-sidecar:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/v1`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  afip-sidecar:
    build:
      context: ./afip-sidecar
    restart: unless-stopped
    environment:
      AFIP_CUIT_EMISOR: ${AFIP_CUIT_EMISOR}
      AFIP_HOMOLOGACION: ${AFIP_HOMOLOGACION:-false}
      AFIP_CERT_PATH: /certs/afip.crt
      AFIP_KEY_PATH: /certs/afip.key
      AFIP_CACHE_DIR: /tmp/afip_cache
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./afip-sidecar/certs:/certs:ro
    # NOT exposed externally — only backend can reach it via internal network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── OPS-02: PostgreSQL Automated Backup ──────────────────────────────────
  # Runs pg_dump every 6 hours, retains 7 days of backups.
  # Backups are stored in the pg_backups volume (map to host for safety).
  pg-backup:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_backups:/backups
      - ./scripts/pg_backup.sh:/scripts/pg_backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Run backup once at startup, then install cron and let crond handle the rest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        chmod +x /scripts/pg_backup.sh
        echo "0 */6 * * * /scripts/pg_backup.sh >> /proc/1/fd/1 2>&1" | crontab -
        echo "[pg-backup] Cron instalado: backup cada 6 horas"
        /scripts/pg_backup.sh
        crond -f -l 2
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pg_data:
  redis_data:
  pdf_storage:
  letsencrypt:
  pg_backups:


server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "0";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";

    # HSTS — force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP — prevent XSS by only loading resources from own origin
    # Note: 'unsafe-inline' in style-src is required by Mantine UI (inline styles).
    # Adjust connect-src to match your backend domain in production.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.blendpos.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Permissions-Policy — disable unused hardware APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker must not be cached
    location = /sw.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
